<!-- System Status Card - Add after admin header, before main container -->
<div class="container mb-4">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-3">
            <div class="row align-items-center">
                <div class="col-auto">
                    <i class="fas fa-server fa-2x text-primary"></i>
                </div>
                <div class="col">
                    <h6 class="mb-1">System Status</h6>
                    <div class="d-flex gap-3">
                        <span id="redisStatus"><i class="fas fa-circle text-secondary"></i> Redis: <strong>Checking...</strong></span>
                        <span id="celeryStatus"><i class="fas fa-circle text-secondary"></i> Celery: <strong>Checking...</strong></span>
                        <span id="dbStatus"><i class="fas fa-circle text-secondary"></i> Database: <strong>Checking...</strong></span>
                    </div>
                </div>
                <div class="col-auto">
                    <small class="text-muted" id="lastCheck">Last check: Never</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// System Status Monitor
function checkSystemStatus() {
    fetch('/admin/api/system-status')
        .then(response => response.json())
        .then(data => {
            // Redis Status
            const redisIcon = data.redis === 'ONLINE' ? 'fa-circle text-success' : 'fa-circle text-danger';
            document.getElementById('redisStatus').innerHTML = `<i class="fas ${redisIcon}"></i> Redis: <strong>${data.redis}</strong>`;
            
            // Celery Status
            const celeryIcon = data.celery === 'ONLINE' ? 'fa-circle text-success' : 'fa-circle text-danger';
            document.getElementById('celeryStatus').innerHTML = `<i class="fas ${celeryIcon}"></i> Celery: <strong>${data.celery}</strong>`;
            
            // Database Status
            const dbIcon = data.database === 'ONLINE' ? 'fa-circle text-success' : 'fa-circle text-danger';
            document.getElementById('dbStatus').innerHTML = `<i class="fas ${dbIcon}"></i> Database: <strong>${data.database}</strong>`;
            
            // Update last check time
            const now = new Date();
            document.getElementById('lastCheck').textContent = `Last check: ${now.toLocaleTimeString()}`;
        })
        .catch(error => {
            console.error('Status check failed:', error);
        });
}

// Check on load and every 10 seconds
checkSystemStatus();
setInterval(checkSystemStatus, 10000);
</script>

<!-- Toast Notification Container -->
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
    <div id="analysisToast" class="toast" role="alert">
        <div class="toast-header bg-success text-white">
            <i class="fas fa-check-circle me-2"></i>
            <strong class="me-auto">Analysis Complete</strong>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body" id="toastMessage">
            Analysis completed successfully!
        </div>
    </div>
</div>

<script>
// Toast Notification System
function showAnalysisToast(caseId, message) {
    const toastEl = document.getElementById('analysisToast');
    const toastMessage = document.getElementById('toastMessage');
    
    toastMessage.innerHTML = `
        <strong>Case #${caseId}</strong><br>
        ${message}<br>
        <a href="/admin/cases/${caseId}" class="btn btn-sm btn-primary mt-2">View Results</a>
    `;
    
    const toast = new bootstrap.Toast(toastEl, {
        autohide: true,
        delay: 8000
    });
    toast.show();
    
    // Play notification sound
    const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIG2m98OScTgwOUarm7blmGgU7k9n1unEiBC13yO/eizEIHWq+8+OWT');
    audio.volume = 0.3;
    audio.play().catch(() => {});
}

// Poll for analysis completion every 15 seconds
setInterval(() => {
    fetch('/admin/api/check-analysis-completion')
        .then(response => response.json())
        .then(data => {
            if (data.completed && data.completed.length > 0) {
                data.completed.forEach(item => {
                    showAnalysisToast(item.case_id, item.message);
                });
            }
        })
        .catch(error => console.log('Analysis check failed:', error));
}, 15000);
</script>
